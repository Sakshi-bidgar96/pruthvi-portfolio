<!DOCTYPE html>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
font-family:Arial;
color:white;
text-align:center;

background:url("background.jpg");
background-size:cover;
background-position:center;
background-attachment:fixed;
}

/* HEADER */

header{
background:rgba(0,0,0,0.8);
padding:30px;
}

header h1{
color:#ffcc00;
font-size:40px;
}

header p{
font-size:18px;
}

/* SECTION */

.section{
background:rgba(0,0,0,0.8);
padding:40px;
}

/* GALLERY */

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
padding:20px;
}

.gallery img{
width:100%;
border-radius:10px;
cursor:pointer;
}

/* FULL SCREEN IMAGE */

#popup{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
justify-content:center;
align-items:center;
}

#popup img{
max-width:90%;
max-height:90%;
}

/* BUTTON */

button{
padding:12px 20px;
border:none;
border-radius:6px;
margin:10px;
cursor:pointer;
font-size:16px;
}

.whatsapp{
background:green;
color:white;
}

.instagram{
background:#E1306C;
color:white;
}

/* PAYMENT */

.payment img{
width:250px;
border-radius:10px;
}

/* FOOTER */

footer{
background:black;
padding:20px;
}

</style>

document.getElementById("popup-img").src=img.src;

function closeImage(){

document.getElementById("popup").style.display="none";

}

</script>
