<!DOCTYPE html>

background:#0a0a0a;

}

header{
background:black;
padding:30px;
}

.logo{
font-size:32px;
color:#ffcc00;
animation: glow 2s infinite alternate;
}

from{ text-shadow:0 0 10px #ffcc00;}
to{ text-shadow:0 0 30px #ffcc00;}
}

.profile img{
width:160px;
border-radius:50%;
border:4px solid #ffcc00;

}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
padding:40px;
}

.gallery img{
width:100%;
border-radius:10px;
cursor:pointer;
}

.section{
padding:40px;
}

button{
padding:12px 20px;
border:none;
border-radius:6px;
margin:5px;
cursor:pointer;
}

.whatsapp{background:green;color:white;}
.gpay{background:#4285F4;color:white;}
.phonepe{background:#5f259f;color:white;}

form input,form textarea{
width:80%;
padding:10px;
margin:10px;
border-radius:5px;
border:none;
}

form button{
background:#ffcc00;
}

footer{
background:black;
padding:20px;
}

</style>
